# =====================================================================
# PITS — Kerberos SSO Apache Configuration
# =====================================================================
#
# This file enables transparent Single Sign-On for domain-joined
# Windows PCs. Users who have already logged into their Windows
# account will be automatically authenticated — no login page needed.
#
# INSTALLATION:
#   1. Install mod_auth_gssapi:
#        sudo apt install libapache2-mod-auth-gssapi
#        sudo a2enmod auth_gssapi
#
#   2. Copy this file to Apache's config directory:
#        sudo cp pits-sso.conf /etc/apache2/conf-available/
#
#   3. Enable the config:
#        sudo a2enconf pits-sso
#        sudo systemctl reload apache2
#
# PREREQUISITES:
#   - Server must be joined to the Active Directory domain
#   - A keytab file must be generated and placed at the path below
#   - See SETUP.md sections 11-12 for the full walkthrough
#
# HOW IT WORKS:
#   - When a user navigates to http://<server>/sso/, Apache checks
#     for a Kerberos ticket in the HTTP headers.
#   - If present and valid, Apache sets the REMOTE_USER variable
#     and passes the request to sso_auth.php.
#   - If no ticket is present (mobile, external), Apache returns
#     401 Unauthorized and the browser falls back. The user should
#     navigate to the normal http://<server>/ login page instead.
#
# =====================================================================

# Point /sso to the SSO handler script
Alias /sso /var/www/html/sso_auth.php

<Location "/sso">
    # Negotiate authentication via Kerberos
    AuthType GSSAPI
    AuthName "PITS — School Domain Login"

    # Path to the keytab generated during domain join setup
    GssapiCredStore keytab:/etc/apache2/pits.keytab

    # Do NOT fall back to Basic auth (password prompt in browser)
    # If no ticket, we want the user to use the normal login page
    GssapiBasicAuth Off

    # Only allow users with a valid Kerberos ticket
    Require valid-user
</Location>
